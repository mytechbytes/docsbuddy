name: Build Android

# Builds the Android release APK on GitHub's runners (no local Android SDK or
# network-egress changes needed) and uploads it for download. The release build
# is debug-signed (see android/app/build.gradle.kts), so the APK installs
# directly for testing — it is NOT a Play Store upload artifact.
#
# Triggers on pushes to main / production, or manually via "Run workflow".
# Apple platforms (iOS + macOS) live in build-apple.yml and are manual-only.

on:
  push:
    branches:
      - main
      - production
  workflow_dispatch:

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.2
          channel: stable
          cache: true

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build release APK (debug-signed, installable)
        # Supabase keys come from repo secrets; when unset, the build falls back
        # to the local fake auth (Env.hasSupabase == false).
        run: |
          flutter build apk --release \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: docsbuddy-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 14

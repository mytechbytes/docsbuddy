name: Release AAB + Play deploy (manual)

# Builds a signed Android App Bundle and (optionally) uploads it straight to a
# Google Play track. Manual-only.
#
# Required repo secrets for the signed build:
#   ANDROID_KEYSTORE_BASE64   base64 of your upload keystore (.jks)
#   ANDROID_KEYSTORE_PASSWORD store password
#   ANDROID_KEY_ALIAS         key alias (e.g. upload)
#   ANDROID_KEY_PASSWORD      key password
#   SUPABASE_URL / SUPABASE_ANON_KEY  (optional) bake the backend into the build
#
# Extra secret to enable direct Play upload (otherwise the AAB is just an artifact):
#   PLAY_SERVICE_ACCOUNT_JSON  full JSON of a Google Cloud service account that
#                              has Play Console access (see docs/play-store-release.md)

on:
  workflow_dispatch:
    inputs:
      track:
        description: "Play track to deploy to (needs PLAY_SERVICE_ACCOUNT_JSON)"
        type: choice
        options: [internal, alpha, beta, production]
        default: internal

jobs:
  aab:
    name: Signed AAB
    runs-on: ubuntu-latest
    env:
      # secrets can't be used in step `if:`, so resolve to a plain flag here.
      HAS_PLAY_SA: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON != '' && 'true' || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.2
          channel: stable
          cache: true

      - name: Verify signing secrets are present
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 is not set — add the signing secrets (see docs/play-store-release.md)."
            exit 1
          fi

      - name: Decode keystore + write key.properties
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=${ANDROID_KEYSTORE_PASSWORD}
          keyPassword=${ANDROID_KEY_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          storeFile=upload-keystore.jks
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Build signed AAB
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          flutter build appbundle --release \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: docsbuddy-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 14

      - name: Deploy to Google Play (${{ inputs.track }})
        if: env.HAS_PLAY_SA == 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: in.mytechbytes.docsbuddy
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: ${{ inputs.track }}
          status: completed

      - name: Note when Play deploy is skipped
        if: env.HAS_PLAY_SA != 'true'
        run: echo "::notice::PLAY_SERVICE_ACCOUNT_JSON not set — built the AAB artifact but did not upload to Play. Download the artifact and upload manually, or add the secret to auto-deploy."

      - name: Clean up signing material
        if: always()
        run: rm -f android/app/upload-keystore.jks android/key.properties
